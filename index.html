<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senkan | Selected Work</title>
  <meta name="description" content="Video editing portfolio by Senkan">
  <meta property="og:title" content="Senkan | Selected Work">
  <meta property="og:description" content="Video editing portfolio by Senkan">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://penni-johnston.senkan.ca">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Inter,sans-serif' font-size='72' font-weight='900' fill='%23ccc69a' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --text-subtle: rgba(255, 255, 255, 0.4);
      --accent: #ccc69a;
      --border: rgba(255, 255, 255, 0.1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      padding: 4rem 2rem 2rem;
      text-align: center;
    }

    .wordmark {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--text);
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--text-muted);
      font-weight: 400;
      max-width: 500px;
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3rem;
      text-align: center;
    }

    .featured-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .video-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .video-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-caption {
      padding: 1rem 1.25rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .secondary-row {
      display: flex;
      justify-content: center;
    }

    .secondary-row .video-card {
      max-width: 520px;
      width: 100%;
    }

    .contact {
      text-align: center;
      padding: 6rem 2rem 5rem;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .contact.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .contact-heading {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .contact a {
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .contact a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    @media (max-width: 700px) {
      .featured-row {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 60vh;
        padding: 3rem 1.5rem;
      }

      .section {
        padding: 3rem 1.25rem;
      }

      .secondary-row .video-card {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1 class="wordmark">SENKAN</h1>
    <p class="tagline">Selected work for the Penni Johnston YouTube channel</p>
  </section>

  <section class="section">
    <h2 class="section-title">Selected Work</h2>

    <div class="featured-row">
      <div class="video-card">
        <div class="video-wrapper">
          <iframe
            src="https://www.youtube.com/embed/LQG8-UAxtng"
            title="Cultural Feature | Ukrainian Dance in Lethbridge"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
        <p class="video-caption">Cultural Feature | Ukrainian Dance in Lethbridge</p>
      </div>

      <div class="video-card">
        <div class="video-wrapper">
          <iframe
            src="https://www.youtube.com/embed/berMvexvzQs"
            title="Team Member Introduction | Talking Head Format"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
          ></iframe>
        </div>
        <p class="video-caption">Team Member Introduction | Talking Head Format</p>
      </div>
    </div>

    <div class="secondary-row">
      <div class="video-card">
        <div class="video-wrapper">
          <video
            controls
            preload="metadata"
            playsinline
          >
            <source src="assets/Black-Excellence-Gala.mp4" type="video/mp4">
            <source src="assets/Black-Excellence-Gala.mov" type="video/quicktime">
            Your browser does not support this video format.
          </video>
        </div>
        <p class="video-caption">Black Excellence Gala | Event Teaser</p>
      </div>
    </div>
  </section>

  <section class="contact">
    <h2 class="contact-heading">Get in touch</h2>
    <a href="mailto:aj@senkan.ca">aj@senkan.ca</a>
  </section>

  <script>
    (function () {
      var targets = document.querySelectorAll('.video-card, .contact');
      if (!('IntersectionObserver' in window)) {
        targets.forEach(function (el) { el.classList.add('visible'); });
        return;
      }
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });
      targets.forEach(function (el) { observer.observe(el); });
    })();
  </script>

</body>
</html>
